<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#8b5cf6">
<title>Party Planner — Kicken Bites</title>
<style>
:root{--o:#e65c00;--p:#8b5cf6;--g:#22c55e;--r:#ef4444;--dark:#1a1a2e;--muted:#666;--rd:14px;--cream:#fff8f0;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(160deg,#faf5ff,#f3e8ff);min-height:100vh;padding-bottom:120px;}

.hdr{background:linear-gradient(135deg,var(--p),#6d28d9);color:white;padding:18px 16px;text-align:center;border-radius:0 0 24px 24px;}
.hdr h1{font-size:1.25rem;font-weight:800;}
.hdr p{font-size:.78rem;opacity:.85;margin-top:3px;}

.wrap{max-width:520px;margin:0 auto;padding:14px;}

.card{background:white;border-radius:var(--rd);padding:15px;margin-bottom:12px;box-shadow:0 2px 10px rgba(139,92,246,.08);}
.ct{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--p);margin-bottom:10px;}

.frow{display:flex;gap:9px;margin-bottom:9px;}
.fg{flex:1;}
.fl{font-size:.72rem;font-weight:700;color:var(--muted);margin-bottom:4px;display:block;}
.fi{width:100%;padding:11px 12px;border:2px solid #eee;border-radius:11px;font-size:.92rem;outline:none;font-family:inherit;}
.fi:focus{border-color:var(--p);}

.date-chips{display:flex;gap:7px;margin-bottom:8px;}
.dchip{flex:1;padding:10px;border:2px solid #eee;border-radius:11px;background:white;text-align:center;font-size:.8rem;font-weight:700;cursor:pointer;transition:.15s;}
.dchip.active{border-color:var(--p);background:#f5f3ff;color:var(--p);}

.sugg-box{background:linear-gradient(135deg,#f5f3ff,#ede9fe);border:2px solid var(--p);border-radius:12px;padding:12px;margin-bottom:11px;display:none;}
.sugg-title{font-weight:800;font-size:.85rem;color:var(--p);margin-bottom:6px;}
.sugg-text{font-size:.78rem;line-height:1.6;color:#444;}
.sugg-apply{width:100%;padding:10px;background:var(--p);color:white;border:none;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;margin-top:8px;}

.mi{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #f3f3f3;}
.mi:last-child{border-bottom:none;}
.mi-img{width:58px;height:58px;border-radius:11px;object-fit:cover;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:1.6rem;flex-shrink:0;}
.mi-info{flex:1;min-width:0;}
.mi-name{font-weight:700;font-size:.9rem;}
.mi-price{color:var(--o);font-weight:800;font-size:.85rem;margin-top:1px;}
.mi-qty{display:flex;align-items:center;gap:8px;}
.qbtn{width:32px;height:32px;border-radius:9px;border:none;background:#f3e8ff;color:var(--p);font-size:1.1rem;font-weight:800;cursor:pointer;}
.qbtn:active{background:var(--p);color:white;}
.qval{min-width:26px;text-align:center;font-weight:800;font-size:.95rem;}

.bill{position:fixed;bottom:0;left:0;right:0;background:white;border-top:2px solid #eee;padding:12px 16px;box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:50;}
.bill-in{max-width:520px;margin:0 auto;}
.brow{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:4px;}
.btotal{font-size:1.05rem;font-weight:900;}
.wa-send{width:100%;padding:14px;background:linear-gradient(135deg,#25d366,#128c7e);color:white;border:none;border-radius:13px;font-size:.95rem;font-weight:800;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;}
.wa-send:disabled{opacity:.5;}

.back-link{display:inline-block;margin-top:10px;color:var(--p);font-size:.8rem;font-weight:600;text-decoration:none;}

#loadBox{text-align:center;padding:40px 20px;color:var(--muted);}
.note-box{background:#fffbeb;border-radius:10px;padding:10px;font-size:.74rem;color:#92400e;line-height:1.5;margin-bottom:11px;}
</style>
</head>
<body>

<div class="hdr">
  <h1>🎉 Party Planner</h1>
  <p>Plan your party order — Kicken Bites</p>
</div>

<div class="wrap">

  <div id="loadBox">⏳ Loading menu…</div>

  <div id="mainForm" style="display:none">

    <!-- CUSTOMER DETAILS -->
    <div class="card">
      <div class="ct">👤 Your Details</div>
      <div class="frow">
        <div class="fg"><label class="fl">Name</label><input class="fi" id="pName" placeholder="Full name"></div>
        <div class="fg"><label class="fl">Mobile</label><input class="fi" id="pPhone" type="tel" inputmode="numeric" maxlength="10" placeholder="10-digit"></div>
      </div>
      <label class="fl">Delivery Address / Venue</label>
      <input class="fi" id="pAddr" placeholder="Party venue address">
    </div>

    <!-- PARTY DETAILS -->
    <div class="card">
      <div class="ct">🎊 Party Details</div>
      <label class="fl">Party Date</label>
      <div class="date-chips">
        <div class="dchip active" id="dcToday" onclick="setPDate('today')">Today</div>
        <div class="dchip" id="dcTom" onclick="setPDate('tomorrow')">Tomorrow</div>
        <div class="dchip" id="dcCustom" onclick="document.getElementById('pDate').showPicker?document.getElementById('pDate').showPicker():document.getElementById('pDate').focus()">📅 Pick</div>
      </div>
      <input type="date" class="fi" id="pDate" style="margin-bottom:9px" onchange="customDatePicked()">
      <div class="frow">
        <div class="fg"><label class="fl">👨 Total Adults</label><input class="fi" id="pAdults" type="number" inputmode="numeric" min="0" placeholder="e.g. 15" oninput="suggestQty()"></div>
        <div class="fg"><label class="fl">🧒 Total Children</label><input class="fi" id="pChildren" type="number" inputmode="numeric" min="0" placeholder="e.g. 5" oninput="suggestQty()"></div>
      </div>
      <div class="frow">
        <div class="fg"><label class="fl">🥬 Veg-Only Adults</label><input class="fi" id="pVegAdults" type="number" inputmode="numeric" min="0" placeholder="e.g. 3" oninput="suggestQty()"></div>
        <div class="fg"><label class="fl">🥬 Veg-Only Children</label><input class="fi" id="pVegChildren" type="number" inputmode="numeric" min="0" placeholder="e.g. 1" oninput="suggestQty()"></div>
      </div>
      <div id="guestSplit" style="font-size:.73rem;color:var(--muted);margin-bottom:9px"></div>
      <label class="fl">Occasion (optional)</label>
      <input class="fi" id="pOccasion" placeholder="Birthday, Anniversary, etc.">
    </div>

    <!-- SMART SUGGESTION -->
    <div class="sugg-box" id="suggBox">
      <div class="sugg-title">🤖 Smart Suggestion</div>
      <div class="sugg-text" id="suggText"></div>
      <button class="sugg-apply" onclick="applySuggestion()">✨ Apply Suggested Quantities</button>
    </div>

    <!-- MENU ITEMS -->
    <div class="card">
      <div class="ct">🍗 Select Items & Quantity</div>
      <div class="note-box">💡 All menu items shown. Select quantities for your party.</div>
      <div id="menuList"></div>
    </div>

    <a class="back-link" href="customer.html">← Back to regular ordering</a>
  </div>
</div>

<!-- BILL BAR -->
<div class="bill" id="billBar" style="display:none">
  <div class="bill-in">
    <div class="brow"><span>Items (<span id="bCount">0</span>)</span><span id="bSub">₹0</span></div>
    <div class="brow btotal"><span>Estimated Total</span><span id="bTotal">₹0</span></div>
    <button class="wa-send" id="waBtn" onclick="sendPartyWA()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    Send Party Order on WhatsApp
    </button>
  </div>
</div>

<script type="module">
import { db, getTodayDate, collection, doc, getDoc } from './src/utils/firebase.js';

let masterItems=[], quantities={}, partyDate='', shopWA='9712951947';

// ---- INIT ----
async function init(){
  try{
    const snap=await getDoc(doc(db,'config','menu'));
    const cfg=snap.exists()?snap.data():{};
    masterItems=(cfg.masterItems||[]).filter(i=>i.name&&i.price>0);
    shopWA=cfg.adminPhone||'9712951947';
    partyDate=getTodayDate();
    document.getElementById('pDate').min=getTodayDate();
    if(!masterItems.length){
      document.getElementById('loadBox').innerHTML='😴 Menu not available. Please contact shop.';
      return;
    }
    renderMenu();
    document.getElementById('loadBox').style.display='none';
    document.getElementById('mainForm').style.display='block';
    document.getElementById('billBar').style.display='block';
    // Restore saved profile
    try{
      const p=JSON.parse(localStorage.getItem('kb_profile')||'{}');
      if(p.name)document.getElementById('pName').value=p.name;
      if(p.phone)document.getElementById('pPhone').value=p.phone;
    }catch(e){}
    const savedPhone=localStorage.getItem('custPhone');
    if(savedPhone&&!document.getElementById('pPhone').value)document.getElementById('pPhone').value=savedPhone;
  }catch(e){
    document.getElementById('loadBox').innerHTML='⚠️ Error loading. Refresh page.';
    console.error(e);
  }
}

// ---- DATE ----
window.setPDate=function(which){
  const t=new Date();
  if(which==='today'){partyDate=getTodayDate();}
  else if(which==='tomorrow'){
    const tm=new Date(t.getTime()+86400000);
    partyDate=tm.toISOString().split('T')[0];
  }
  document.getElementById('dcToday').classList.toggle('active',which==='today');
  document.getElementById('dcTom').classList.toggle('active',which==='tomorrow');
  document.getElementById('dcCustom').classList.remove('active');
  document.getElementById('pDate').value=partyDate;
};

window.customDatePicked=function(){
  const v=document.getElementById('pDate').value;
  if(!v)return;
  partyDate=v;
  document.getElementById('dcToday').classList.remove('active');
  document.getElementById('dcTom').classList.remove('active');
  document.getElementById('dcCustom').classList.add('active');
};

// ---- SMART AI-STYLE SUGGESTION ENGINE ----
// Categorize items: starter / main / dessert + veg / nonveg
function categorizeItem(item){
  const n=(item.name||'').toLowerCase();
  const d=(item.desc||'').toLowerCase();
  const all=n+' '+d;
  let course='main';
  if(/tikka|kebab|kabab|pakora|pakoda|65|lollipop|wings|fry|roll|cutlet|starter|snack|manchurian|chilli|chilly|spring/i.test(all)&&!/rice|biryani|pulao|curry|masala|korma/i.test(n)) course='starter';
  if(/kheer|halwa|gulab|jamun|rasgulla|barfi|laddu|ladoo|sweet|dessert|custard|ice cream|kulfi|phirni|sewai|shahi tukda/i.test(all)) course='dessert';
  let type='nonveg';
  if(/paneer|veg|dal|aloo|gobi|bhindi|matar|chana|rajma|mushroom|sabzi|salad|raita|naan|roti|kheer|halwa|gulab|jamun|rasgulla|barfi|laddu|custard|kulfi|phirni|sewai/i.test(all)&&!/chicken|mutton|fish|egg|prawn|keema|meat/i.test(all)) type='veg';
  return {course,type};
}

window.suggestQty=function(){
  const adults=parseInt(document.getElementById('pAdults').value)||0;
  const children=parseInt(document.getElementById('pChildren').value)||0;
  const vegAdults=Math.min(parseInt(document.getElementById('pVegAdults').value)||0,adults);
  const vegChildren=Math.min(parseInt(document.getElementById('pVegChildren').value)||0,children);
  const nvAdults=adults-vegAdults;
  const nvChildren=children-vegChildren;
  const box=document.getElementById('suggBox');
  const totalGuests=adults+children;

  // Show live split
  const splitEl=document.getElementById('guestSplit');
  if(splitEl&&totalGuests>0){
    splitEl.innerHTML='🍗 Non-Veg: '+nvAdults+' adults + '+nvChildren+' children | 🥬 Veg-Only: '+vegAdults+' adults + '+vegChildren+' children';
  }

  if(totalGuests<2){box.style.display='none';return;}

  // Effective appetites (child = 0.6 adult)
  const totalEff=adults+children*0.6;           // everyone (for veg items - nonveg guests also eat veg)
  const nvEff=nvAdults+nvChildren*0.6;          // nonveg guests only (for nonveg items)
  const vegOnlyEff=vegAdults+vegChildren*0.6;   // veg-only guests

  const items=masterItems.map(i=>({...i,...categorizeItem(i)}));

  // BULK: 2 starters, 2-4 mains, 2 desserts
  function pickBulk(arr, count, needVeg){
    const picked=[];
    if(needVeg){
      const veg=arr.filter(i=>i.type==='veg');
      if(veg.length)picked.push(veg[0]);
    }
    arr.filter(i=>!picked.includes(i)).slice(0, count-picked.length).forEach(i=>picked.push(i));
    return picked.slice(0,count);
  }

  const needVeg=vegOnlyEff>0;
  const mainCount=totalGuests<15?2:totalGuests<=30?3:4;

  const starters=pickBulk(items.filter(i=>i.course==='starter'),2,needVeg);
  const mains=pickBulk(items.filter(i=>i.course==='main'),mainCount,needVeg);
  const desserts=pickBulk(items.filter(i=>i.course==='dessert'),2,false);

  window._suggestion={};
  let text='For <b>'+adults+' adults + '+children+' children</b>';
  if(vegAdults+vegChildren>0)text+='<br>(🍗 '+(nvAdults+nvChildren)+' non-veg eaters, 🥬 '+(vegAdults+vegChildren)+' veg-only)';
  text+=':<br><br>';

  // Sizing logic:
  // VEG items → sized for ALL guests (nonveg guests eat veg too)
  // NONVEG items → sized for nonveg guests only
  function calcPlates(item, course, itemsInCourse){
    const divisor=course==='starter'?2.5:course==='main'?1.3:1;
    const sameTypeCount=itemsInCourse.filter(x=>x.type===item.type).length||1;
    if(item.type==='veg'){
      // Veg-only guests depend entirely on veg; nonveg guests partially (50%)
      const demand=vegOnlyEff+(nvEff*0.5);
      return Math.max(1,Math.ceil(demand/divisor/sameTypeCount));
    }else{
      return Math.max(1,Math.ceil(nvEff/divisor/sameTypeCount));
    }
  }

  if(starters.length){
    text+='🥟 <b>Starters:</b><br>';
    starters.forEach(i=>{
      const p=calcPlates(i,'starter',starters);
      window._suggestion[i.id]=p;
      text+='&nbsp;&nbsp;'+i.name+' ×'+p+' '+(i.type==='veg'?'🥬':'🍗')+'<br>';
    });
  }
  if(mains.length){
    text+='🍛 <b>Main Course:</b><br>';
    mains.forEach(i=>{
      const p=calcPlates(i,'main',mains);
      window._suggestion[i.id]=p;
      text+='&nbsp;&nbsp;'+i.name+' ×'+p+' '+(i.type==='veg'?'🥬':'🍗')+'<br>';
    });
  }
  if(desserts.length){
    text+='🍮 <b>Desserts:</b><br>';
    desserts.forEach(i=>{
      const p=Math.max(1,Math.ceil(totalGuests/desserts.length));
      window._suggestion[i.id]=p;
      text+='&nbsp;&nbsp;'+i.name+' ×'+p+'<br>';
    });
  }

  let estCost=0;
  Object.entries(window._suggestion).forEach(([id,qty])=>{
    const item=masterItems.find(i=>i.id===id);
    if(item)estCost+=item.price*qty;
  });
  text+='<br>💰 Estimated: <b>₹'+estCost+'</b> (~₹'+Math.round(estCost/totalGuests)+'/guest)';

  document.getElementById('suggText').innerHTML=text;
  box.style.display='block';
};

window.applySuggestion=function(){
  if(!window._suggestion)return;
  quantities={...window._suggestion};
  renderMenu();
  updateBill();
};

// ---- MENU ----
function renderMenu(){
  const list=document.getElementById('menuList');
  list.innerHTML=masterItems.map(item=>{
    const q=quantities[item.id]||0;
    const img=item.imageUrl
      ?`<img class="mi-img" src="${item.imageUrl}" alt="">`
      :`<div class="mi-img">${item.emoji||'🍛'}</div>`;
    return `<div class="mi">
      ${img}
      <div class="mi-info">
        <div class="mi-name">${item.name}</div>
        <div class="mi-price">₹${item.price}/plate</div>
      </div>
      <div class="mi-qty">
        <button class="qbtn" onclick="chQty('${item.id}',-1)">−</button>
        <span class="qval" id="q_${item.id}">${q}</span>
        <button class="qbtn" onclick="chQty('${item.id}',1)">+</button>
      </div>
    </div>`;
  }).join('');
}

window.chQty=function(id,delta){
  quantities[id]=Math.max(0,(quantities[id]||0)+delta);
  document.getElementById('q_'+id).textContent=quantities[id];
  updateBill();
};

// ---- BILL ----
function updateBill(){
  let count=0,total=0;
  Object.entries(quantities).forEach(([id,q])=>{
    if(q>0){
      const item=masterItems.find(i=>i.id===id);
      if(item){count+=q;total+=item.price*q;}
    }
  });
  document.getElementById('bCount').textContent=count;
  document.getElementById('bSub').textContent='₹'+total;
  document.getElementById('bTotal').textContent='₹'+total;
  document.getElementById('waBtn').disabled=count===0;
}

// ---- SEND WHATSAPP ----
window.sendPartyWA=function(){
  const name=document.getElementById('pName').value.trim();
  const phone=document.getElementById('pPhone').value.trim();
  const addr=document.getElementById('pAddr').value.trim();
  const adults=document.getElementById('pAdults').value.trim();
  const children=document.getElementById('pChildren').value.trim();
  const vegAdults=document.getElementById('pVegAdults').value.trim()||'0';
  const vegChildren=document.getElementById('pVegChildren').value.trim()||'0';
  const nvAdultsC=(parseInt(adults)||0)-(parseInt(vegAdults)||0);
  const nvChildrenC=(parseInt(children)||0)-(parseInt(vegChildren)||0);
  const occasion=document.getElementById('pOccasion').value.trim();

  if(!name){alert('Please enter your name');return;}
  if(phone.length!==10||isNaN(phone)){alert('Enter valid 10-digit mobile');return;}
  if(!addr){alert('Please enter party venue address');return;}
  if(!partyDate){alert('Select party date');return;}

  // Save profile
  try{localStorage.setItem('kb_profile',JSON.stringify({name,phone}));}catch(e){}

  const selected=[];
  let total=0;
  Object.entries(quantities).forEach(([id,q])=>{
    if(q>0){
      const item=masterItems.find(i=>i.id===id);
      if(item){selected.push({name:item.name,qty:q,price:item.price,sub:item.price*q});total+=item.price*q;}
    }
  });
  if(!selected.length){alert('Select at least one item');return;}

  const dateDisp=new Date(partyDate+'T00:00:00').toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long'});
  const nl='\n';
  const itemLines=selected.map(s=>'  • '+s.name+' × '+s.qty+' = ₹'+s.sub).join(nl);

  const msg=
    '🎉 *PARTY ORDER REQUEST — KICKEN BITES*'+nl+
    '━━━━━━━━━━━━━━━━━━━'+nl+
    '👤 Name: '+name+nl+
    '📞 Phone: '+phone+nl+
    '📅 Party Date: '+dateDisp+nl+
    '👨 Adults: '+(adults||0)+' | 🧒 Children: '+(children||0)+nl+
    '🍗 Non-Veg: '+nvAdultsC+' adults, '+nvChildrenC+' children'+nl+
    '🥬 Veg-Only: '+vegAdults+' adults, '+vegChildren+' children'+nl+
    (occasion?'🎊 Occasion: '+occasion+nl:'')+
    '📍 Venue: '+addr+nl+
    '━━━━━━━━━━━━━━━━━━━'+nl+
    '*Items Requested:*'+nl+
    itemLines+nl+
    '━━━━━━━━━━━━━━━━━━━'+nl+
    '💰 *Estimated Total: ₹'+total+'*'+nl+nl+
    'Please confirm availability and final price. Thank you! 🙏';

  location.href='https://wa.me/91'+shopWA+'?text='+encodeURIComponent(msg);
};

init();
</script>
</body>
</html>
