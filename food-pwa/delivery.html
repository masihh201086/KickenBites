<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e65c00">
<title>Delivery Boy — Kicken Bites</title>
<style>
  :root{--orange:#e65c00;--green:#22c55e;--red:#ef4444;--dark:#1a1a2e;--radius:14px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;min-height:100vh;}
  .header{background:var(--dark);color:white;padding:16px 18px;text-align:center;}
  .header h1{font-size:1.1rem;font-weight:700;}
  .header p{font-size:.75rem;opacity:.7;margin-top:3px;}
  .container{padding:16px;}
  .card{background:white;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
  .card-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;margin-bottom:10px;}
  .inp{width:100%;padding:12px 13px;border:2px solid #e5e5e5;border-radius:var(--radius);font-size:.95rem;outline:none;font-family:inherit;margin-bottom:10px;}
  .inp:focus{border-color:var(--orange);}
  .start-btn{width:100%;padding:18px;border:none;border-radius:var(--radius);font-size:1.1rem;font-weight:800;cursor:pointer;transition:all .2s;}
  .start-btn.off{background:linear-gradient(135deg,var(--green),#16a34a);color:white;box-shadow:0 4px 16px rgba(34,197,94,.4);}
  .start-btn.on{background:linear-gradient(135deg,var(--red),#dc2626);color:white;box-shadow:0 4px 16px rgba(239,68,68,.4);}
  .status-box{text-align:center;padding:20px;border-radius:var(--radius);margin-bottom:12px;}
  .status-box.active{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid var(--green);}
  .status-box.inactive{background:#f9f9f9;border:2px solid #eee;}
  .status-icon{font-size:3rem;margin-bottom:8px;}
  .status-text{font-weight:700;font-size:1rem;}
  .status-sub{font-size:.78rem;color:#666;margin-top:4px;}
  .gps-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:.82rem;font-weight:600;margin-bottom:10px;}
  .gps-bar.good{background:#f0fdf4;color:var(--green);}
  .gps-bar.bad{background:#fef2f2;color:var(--red);}
  .gps-bar.waiting{background:#fffbeb;color:#92400e;}
  .gps-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .gps-dot.good{background:var(--green);animation:blink 1.5s infinite;}
  .gps-dot.bad{background:var(--red);}
  .gps-dot.waiting{background:#f59e0b;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .delivery-item{border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:8px;}
  .d-name{font-weight:700;font-size:.9rem;}
  .d-addr{font-size:.78rem;color:#666;margin-top:3px;}
  .d-phone{font-size:.78rem;color:var(--orange);margin-top:3px;}
  .d-items{font-size:.78rem;color:#333;margin-top:4px;}
  .call-btn{float:right;padding:6px 12px;background:var(--green);color:white;border:none;border-radius:8px;font-size:.75rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;}
  .coords{font-size:.72rem;color:#999;text-align:center;margin-top:8px;}
  .update-count{font-size:.72rem;color:var(--green);text-align:center;margin-top:4px;}
  .err-msg{background:#fef2f2;color:var(--red);border-radius:10px;padding:10px;font-size:.8rem;margin-bottom:10px;display:none;}
</style>
</head>
<body>
<div class="header">
  <h1>🛵 Kicken Bites — Delivery</h1>
  <p>Delivery Boy App</p>
</div>
<div class="container">

  <div class="card" id="setupCard">
    <div class="card-title">Your Details</div>
    <input class="inp" id="boyName" placeholder="Your name" type="text">
    <input class="inp" id="boyPhone" placeholder="Your mobile number" type="tel" inputmode="numeric" maxlength="10">
  </div>

  <div class="err-msg" id="errMsg"></div>

  <div class="gps-bar waiting" id="gpsBar">
    <div class="gps-dot waiting"></div>
    <span id="gpsText">GPS not started</span>
  </div>

  <div class="status-box inactive" id="statusBox">
    <div class="status-icon">😴</div>
    <div class="status-text">Not Delivering</div>
    <div class="status-sub">Press Start to begin live tracking</div>
  </div>

  <button class="start-btn off" id="mainBtn" onclick="toggleDelivery()">
    🟢 Start Delivery & Share Location
  </button>

  <div class="coords" id="coordsDisplay"></div>
  <div class="update-count" id="updateCount"></div>

  <div class="card" style="margin-top:14px">
    <div class="card-title">Today's Delivery Orders</div>
    <div id="deliveryList"><p style="color:#999;font-size:.82rem;text-align:center;padding:12px">Loading orders…</p></div>
  </div>

</div>

<script type="module">
// Direct Firebase imports — no dependency on firebase.js exports
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, onSnapshot, collection, query, where, orderBy, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD7in6rCrdL5aiDoY9w8i3k3o9yQXqEWo4",
  authDomain: "myfood-6487f.firebaseapp.com",
  projectId: "myfood-6487f",
  storageBucket: "myfood-6487f.firebasestorage.app",
  messagingSenderId: "133560849575",
  appId: "1:133560849575:web:2a7aa07ef8047928beb782"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function getTodayDate() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

let isDelivering = false;
let watchId = null;
let updateCount = 0;

// Load saved name/phone
const savedName = localStorage.getItem('boyName') || '';
const savedPhone = localStorage.getItem('boyPhone') || '';
if (savedName) document.getElementById('boyName').value = savedName;
if (savedPhone) document.getElementById('boyPhone').value = savedPhone;

// Load today's delivery orders
function loadOrders() {
  try {
    const today = getTodayDate();
    const q = query(
      collection(db, 'orders'),
      where('date', '==', today),
      where('orderType', '==', 'delivery'),
      orderBy('createdAt', 'desc')
    );
    onSnapshot(q, snap => {
      const orders = snap.docs.map(d => ({id:d.id,...d.data()}))
        .filter(o => ['confirmed','ready','pending_payment'].includes(o.status));
      const list = document.getElementById('deliveryList');
      if (!orders.length) {
        list.innerHTML = '<p style="color:#999;font-size:.82rem;text-align:center;padding:12px">No delivery orders today</p>';
        return;
      }
      list.innerHTML = orders.map((o,i) => `
        <div class="delivery-item">
          <div style="display:flex;align-items:flex-start">
            <div style="flex:1">
              <div class="d-name">#${i+1} ${o.name}</div>
              <div class="d-addr">📍 ${o.address}</div>
              <div class="d-phone">📞 ${o.phone}</div>
              <div class="d-items">${(o.items||[]).map(i=>`${i.name}×${i.qty}`).join(', ')} | ₹${o.total}</div>
            </div>
            <a class="call-btn" href="tel:${o.phone}">Call</a>
          </div>
        </div>`).join('');
    }, err => {
      console.error('Orders load error:', err);
      document.getElementById('deliveryList').innerHTML = '<p style="color:#999;font-size:.82rem;text-align:center;padding:12px">Could not load orders</p>';
    });
  } catch(e) {
    console.error('loadOrders error:', e);
  }
}

loadOrders();

// Toggle delivery
window.toggleDelivery = function() {
  const name = document.getElementById('boyName').value.trim();
  const phone = document.getElementById('boyPhone').value.trim();
  const errEl = document.getElementById('errMsg');
  errEl.style.display = 'none';

  if (!name) { showErr('Please enter your name'); return; }
  if (!phone) { showErr('Please enter your mobile number'); return; }

  localStorage.setItem('boyName', name);
  localStorage.setItem('boyPhone', phone);

  if (!isDelivering) {
    startTracking(name, phone);
  } else {
    stopTracking();
  }
};

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function startTracking(name, phone) {
  if (!navigator.geolocation) {
    showErr('GPS not supported on this device. Please use Chrome on Android.');
    return;
  }

  setGpsBar('waiting', 'Requesting GPS permission…');

  // First get current position to trigger permission prompt
  navigator.geolocation.getCurrentPosition(
    pos => {
      // Permission granted — now start watching
      isDelivering = true;
      updateUI(true);
      saveLocation(pos, name, phone);

      watchId = navigator.geolocation.watchPosition(
        pos => { saveLocation(pos, name, phone); },
        err => { setGpsBar('bad', 'GPS Error: ' + err.message); },
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
      );
    },
    err => {
      if (err.code === 1) {
        showErr('GPS permission denied! Please allow location access in browser settings and try again.');
      } else if (err.code === 2) {
        showErr('GPS not available. Please check if location is enabled on your phone.');
      } else {
        showErr('GPS timeout. Please try again.');
      }
      setGpsBar('bad', 'GPS permission denied');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

async function saveLocation(pos, name, phone) {
  updateCount++;
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const acc = Math.round(pos.coords.accuracy);

  setGpsBar('good', `GPS Active — Accuracy: ${acc}m`);
  document.getElementById('coordsDisplay').textContent = `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  document.getElementById('updateCount').textContent = `✅ Location updated ${updateCount} times`;

  try {
    await setDoc(doc(db, 'delivery', 'status'), {
      isDelivering: true,
      lat, lng,
      boyName: name,
      boyPhone: phone,
      accuracy: acc,
      updatedAt: new Date().toISOString()
    });
  } catch(e) {
    console.error('Save location error:', e);
  }
}

async function stopTracking() {
  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  isDelivering = false;
  updateCount = 0;

  try {
    await setDoc(doc(db, 'delivery', 'status'), {
      isDelivering: false, lat: null, lng: null,
      boyName: '', boyPhone: '',
      updatedAt: new Date().toISOString()
    });
  } catch(e) { console.error('Stop tracking error:', e); }

  setGpsBar('waiting', 'GPS stopped');
  document.getElementById('coordsDisplay').textContent = '';
  document.getElementById('updateCount').textContent = '';
  updateUI(false);
}

function updateUI(active) {
  const btn = document.getElementById('mainBtn');
  const box = document.getElementById('statusBox');
  const setup = document.getElementById('setupCard');
  if (active) {
    btn.className = 'start-btn on';
    btn.textContent = '🔴 Stop Delivery & Tracking';
    box.className = 'status-box active';
    box.innerHTML = '<div class="status-icon">🛵</div><div class="status-text" style="color:var(--green)">Delivery Active!</div><div class="status-sub">Customers can see your live location</div>';
    setup.style.opacity = '.5';
    setup.style.pointerEvents = 'none';
  } else {
    btn.className = 'start-btn off';
    btn.textContent = '🟢 Start Delivery & Share Location';
    box.className = 'status-box inactive';
    box.innerHTML = '<div class="status-icon">😴</div><div class="status-text">Not Delivering</div><div class="status-sub">Press Start to begin live tracking</div>';
    setup.style.opacity = '1';
    setup.style.pointerEvents = 'auto';
  }
}

function setGpsBar(state, text) {
  const bar = document.getElementById('gpsBar');
  bar.className = 'gps-bar ' + state;
  bar.innerHTML = `<div class="gps-dot ${state}"></div><span>${text}</span>`;
}
</script>
</body>
</html>
