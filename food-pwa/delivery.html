<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e65c00">
<title>Delivery Boy — Kicken Bites</title>
<style>
  :root{--orange:#e65c00;--green:#22c55e;--red:#ef4444;--dark:#1a1a2e;--blue:#3b82f6;--radius:14px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;min-height:100vh;}
  .header{background:var(--dark);color:white;padding:16px 18px;text-align:center;}
  .header h1{font-size:1.1rem;font-weight:700;}
  .header p{font-size:.75rem;opacity:.7;margin-top:3px;}
  .container{padding:14px;}
  .card{background:white;border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.07);}
  .card-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#888;margin-bottom:10px;}
  .inp{width:100%;padding:11px 13px;border:2px solid #e5e5e5;border-radius:var(--radius);font-size:.92rem;outline:none;font-family:inherit;margin-bottom:9px;}
  .inp:focus{border-color:var(--orange);}
  .start-btn{width:100%;padding:16px;border:none;border-radius:var(--radius);font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;margin-bottom:10px;}
  .start-btn.off{background:linear-gradient(135deg,var(--green),#16a34a);color:white;box-shadow:0 4px 14px rgba(34,197,94,.35);}
  .start-btn.on{background:linear-gradient(135deg,var(--red),#dc2626);color:white;box-shadow:0 4px 14px rgba(239,68,68,.35);}
  .status-box{text-align:center;padding:16px;border-radius:var(--radius);margin-bottom:12px;}
  .status-box.active{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid var(--green);}
  .status-box.inactive{background:#f9f9f9;border:2px solid #eee;}
  .status-icon{font-size:2.5rem;margin-bottom:6px;}
  .status-text{font-weight:700;font-size:.95rem;}
  .status-sub{font-size:.75rem;color:#666;margin-top:3px;}
  .gps-bar{display:flex;align-items:center;gap:8px;padding:9px 13px;border-radius:10px;font-size:.8rem;font-weight:600;margin-bottom:10px;}
  .gps-bar.good{background:#f0fdf4;color:var(--green);}
  .gps-bar.bad{background:#fef2f2;color:var(--red);}
  .gps-bar.waiting{background:#fffbeb;color:#92400e;}
  .gps-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .gps-dot.good{background:var(--green);animation:blink 1.5s infinite;}
  .gps-dot.bad{background:var(--red);}
  .gps-dot.waiting{background:#f59e0b;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* ORDER CARDS */
  .order-card{border:2px solid #eee;border-radius:12px;padding:13px;margin-bottom:10px;background:white;}
  .order-card.active-delivery{border-color:var(--orange);background:#fff8f0;}
  .order-card.delivered{border-color:var(--green);background:#f0fdf4;opacity:.7;}
  .oc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .oc-name{font-weight:700;font-size:.95rem;}
  .oc-status{font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:20px;}
  .st-confirmed{background:#eff6ff;color:var(--blue);}
  .st-ready{background:#fff3e8;color:var(--orange);}
  .st-out{background:#fef9c3;color:#92400e;}
  .st-delivered{background:#f0fdf4;color:var(--green);}
  .oc-addr{font-size:.8rem;color:#555;margin:4px 0;line-height:1.4;}
  .oc-items{font-size:.78rem;color:#333;margin:4px 0;}
  .oc-total{font-weight:700;color:var(--orange);font-size:.88rem;margin:4px 0;}
  .oc-btns{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
  .call-btn{padding:8px 14px;background:var(--green);color:white;border:none;border-radius:9px;font-size:.78rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
  .pickup-btn{padding:8px 14px;background:var(--orange);color:white;border:none;border-radius:9px;font-size:.78rem;font-weight:700;cursor:pointer;}
  .deliver-btn{flex:1;padding:10px;background:linear-gradient(135deg,var(--green),#16a34a);color:white;border:none;border-radius:10px;font-size:.85rem;font-weight:800;cursor:pointer;box-shadow:0 3px 10px rgba(34,197,94,.3);}
  .delivered-badge{flex:1;text-align:center;padding:9px;background:#f0fdf4;color:var(--green);border-radius:10px;font-size:.82rem;font-weight:700;}

  .err-msg{background:#fef2f2;color:var(--red);border-radius:10px;padding:10px;font-size:.8rem;margin-bottom:10px;display:none;line-height:1.4;}
  .coords{font-size:.7rem;color:#999;text-align:center;margin-top:6px;}
  .update-badge{font-size:.7rem;color:var(--green);text-align:center;margin-top:3px;}
  .empty-orders{text-align:center;padding:20px;color:#999;font-size:.82rem;}
</style>
</head>
<body>
<div class="header">
  <h1>🛵 Kicken Bites — Delivery</h1>
  <p>Delivery Boy App</p>
</div>
<div class="container">

  <div class="card" id="setupCard">
    <div class="card-title">Your Details</div>
    <input class="inp" id="boyName" placeholder="Your name" type="text">
    <input class="inp" id="boyPhone" placeholder="Your mobile number" type="tel" inputmode="numeric" maxlength="10">
  </div>

  <div class="err-msg" id="errMsg"></div>

  <div class="gps-bar waiting" id="gpsBar">
    <div class="gps-dot waiting"></div>
    <span id="gpsText">GPS not started</span>
  </div>

  <div class="status-box inactive" id="statusBox">
    <div class="status-icon">😴</div>
    <div class="status-text">Not Delivering</div>
    <div class="status-sub">Press Start to begin live tracking</div>
  </div>

  <button class="start-btn off" id="mainBtn" onclick="toggleDelivery()">
    🟢 Start Delivery & Share Location
  </button>

  <div class="coords" id="coordsDisplay"></div>
  <div class="update-badge" id="updateCount"></div>

  <div class="card" style="margin-top:4px">
    <div class="card-title">📦 Today's Delivery Orders</div>
    <div id="deliveryList"><p class="empty-orders">Loading orders…</p></div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, setDoc, updateDoc, onSnapshot, collection, query, where, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD7in6rCrdL5aiDoY9w8i3k3o9yQXqEWo4",
  authDomain: "myfood-6487f.firebaseapp.com",
  projectId: "myfood-6487f",
  storageBucket: "myfood-6487f.firebasestorage.app",
  messagingSenderId: "133560849575",
  appId: "1:133560849575:web:2a7aa07ef8047928beb782"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function getTodayDate() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

let isDelivering = false;
let watchId = null;
let updateCount = 0;
let allOrders = [];

// Restore saved details
const savedName = localStorage.getItem('boyName') || '';
const savedPhone = localStorage.getItem('boyPhone') || '';
if (savedName) document.getElementById('boyName').value = savedName;
if (savedPhone) document.getElementById('boyPhone').value = savedPhone;

// Load today's delivery orders live
function loadOrders() {
  try {
    const today = getTodayDate();
    const q = query(
      collection(db, 'orders'),
      where('date', '==', today),
      where('orderType', '==', 'delivery'),
      orderBy('createdAt', 'desc')
    );
    onSnapshot(q, snap => {
      allOrders = snap.docs.map(d => ({id:d.id,...d.data()}));
      renderOrders();
    }, err => {
      console.error('Orders error:', err);
      document.getElementById('deliveryList').innerHTML = '<p class="empty-orders">Could not load orders</p>';
    });
  } catch(e) { console.error(e); }
}
loadOrders();

function renderOrders() {
  const list = document.getElementById('deliveryList');
  const relevant = allOrders.filter(o => ['confirmed','ready','out_for_delivery','delivered'].includes(o.status));
  if (!relevant.length) {
    list.innerHTML = '<p class="empty-orders">No delivery orders today</p>';
    return;
  }
  const statusLabel = {confirmed:'✅ Confirmed', ready:'📦 Ready', out_for_delivery:'🛵 Out for Delivery', delivered:'🎉 Delivered'};
  const statusClass = {confirmed:'st-confirmed', ready:'st-ready', out_for_delivery:'st-out', delivered:'st-delivered'};
  list.innerHTML = relevant.map((o,i) => {
    const isDelivered = o.status === 'delivered';
    const isOut = o.status === 'out_for_delivery';
    const time = o.createdAt ? new Date(o.createdAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="order-card ${isOut?'active-delivery':''} ${isDelivered?'delivered':''}">
      <div class="oc-top">
        <div class="oc-name">#${i+1} ${o.name}</div>
        <span class="oc-status ${statusClass[o.status]||''}">${statusLabel[o.status]||o.status}</span>
      </div>
      <div class="oc-addr">📍 ${o.address}</div>
      <div class="oc-items">🍛 ${(o.items||[]).map(i=>`${i.name} ×${i.qty}`).join(', ')}</div>
      <div class="oc-total">💰 ₹${o.total} &nbsp;|&nbsp; ⏰ ${time}</div>
      <div class="oc-btns">
        <a class="call-btn" href="tel:${o.phone}">📞 Call Customer</a>
        ${!isDelivered && !isOut ? `<button class="pickup-btn" onclick="markPickedUp('${o.id}')">🛵 Picked Up</button>` : ''}
        ${isOut ? `<button class="deliver-btn" onclick="markDelivered('${o.id}', '${o.name}', '${o.phone}')">✅ Mark as Delivered</button>` : ''}
        ${isDelivered ? `<div class="delivered-badge">✅ Delivered Successfully!</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// Mark order as picked up / out for delivery
window.markPickedUp = async function(orderId) {
  try {
    await updateDoc(doc(db, 'orders', orderId), {
      status: 'out_for_delivery',
      pickedUpAt: new Date().toISOString()
    });
  } catch(e) { alert('Error updating order'); }
};

// Mark order as delivered
window.markDelivered = async function(orderId, custName, custPhone) {
  if (!confirm(`Confirm delivery to ${custName}?`)) return;
  try {
    await updateDoc(doc(db, 'orders', orderId), {
      status: 'delivered',
      deliveredAt: new Date().toISOString()
    });
    // Update delivery status in Firebase — mark this order done
    await setDoc(doc(db, 'delivery', orderId), {
      orderId, custName, custPhone,
      status: 'delivered',
      deliveredAt: new Date().toISOString()
    });
    showSuccess(`Order delivered to ${custName}! ✅`);
  } catch(e) { alert('Error marking delivered'); }
};

function showSuccess(msg) {
  const d = document.createElement('div');
  d.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:12px 24px;border-radius:50px;font-weight:700;font-size:.9rem;z-index:999;box-shadow:0 4px 14px rgba(0,0,0,.2)';
  d.textContent = msg;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 3000);
}

// GPS Tracking
window.toggleDelivery = function() {
  const name = document.getElementById('boyName').value.trim();
  const phone = document.getElementById('boyPhone').value.trim();
  document.getElementById('errMsg').style.display = 'none';
  if (!name) { showErr('Please enter your name'); return; }
  if (!phone) { showErr('Please enter your mobile number'); return; }
  localStorage.setItem('boyName', name);
  localStorage.setItem('boyPhone', phone);
  if (!isDelivering) { startTracking(name, phone); } else { stopTracking(); }
};

function showErr(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = '⚠️ ' + msg;
  el.style.display = 'block';
}

function startTracking(name, phone) {
  if (!navigator.geolocation) { showErr('GPS not supported. Please use Chrome on Android.'); return; }
  setGpsBar('waiting', 'Requesting GPS permission…');
  navigator.geolocation.getCurrentPosition(
    pos => {
      isDelivering = true;
      updateUI(true);
      saveLocation(pos, name, phone);
      watchId = navigator.geolocation.watchPosition(
        p => saveLocation(p, name, phone),
        e => setGpsBar('bad', 'GPS Error: ' + e.message),
        { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
      );
    },
    err => {
      const msgs = ['','GPS permission denied! Go to browser Settings → allow Location and try again.','GPS not available. Enable location on your phone.','GPS timeout. Try again.'];
      showErr(msgs[err.code] || 'GPS error');
      setGpsBar('bad', 'GPS failed');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

async function saveLocation(pos, name, phone) {
  updateCount++;
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  setGpsBar('good', `GPS Active — Accuracy: ${Math.round(pos.coords.accuracy)}m`);
  document.getElementById('coordsDisplay').textContent = `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
  document.getElementById('updateCount').textContent = `✅ Updated ${updateCount} times`;
  try {
    await setDoc(doc(db, 'delivery', 'status'), {
      isDelivering: true, lat, lng,
      boyName: name, boyPhone: phone,
      accuracy: pos.coords.accuracy,
      updatedAt: new Date().toISOString()
    });
  } catch(e) { console.error('Save location error:', e); }
}

async function stopTracking() {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  isDelivering = false; updateCount = 0;
  try {
    await setDoc(doc(db, 'delivery', 'status'), {
      isDelivering: false, lat: null, lng: null,
      boyName: '', boyPhone: '', updatedAt: new Date().toISOString()
    });
  } catch(e) { console.error(e); }
  setGpsBar('waiting', 'GPS stopped');
  document.getElementById('coordsDisplay').textContent = '';
  document.getElementById('updateCount').textContent = '';
  updateUI(false);
}

function updateUI(active) {
  const btn = document.getElementById('mainBtn');
  const box = document.getElementById('statusBox');
  const setup = document.getElementById('setupCard');
  if (active) {
    btn.className = 'start-btn on';
    btn.textContent = '🔴 Stop Delivery & Tracking';
    box.className = 'status-box active';
    box.innerHTML = '<div class="status-icon">🛵</div><div class="status-text" style="color:var(--green)">Delivery Active!</div><div class="status-sub">Customers can see your live location</div>';
    setup.style.cssText = 'opacity:.5;pointer-events:none';
  } else {
    btn.className = 'start-btn off';
    btn.textContent = '🟢 Start Delivery & Share Location';
    box.className = 'status-box inactive';
    box.innerHTML = '<div class="status-icon">😴</div><div class="status-text">Not Delivering</div><div class="status-sub">Press Start to begin live tracking</div>';
    setup.style.cssText = '';
  }
}

function setGpsBar(state, text) {
  const bar = document.getElementById('gpsBar');
  bar.className = 'gps-bar ' + state;
  bar.innerHTML = `<div class="gps-dot ${state}"></div><span>${text}</span>`;
}
</script>
</body>
</html>
