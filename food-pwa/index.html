<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e65c00">
<link rel="manifest" href="manifest.json">
<title>Food Order System</title>
<style>
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #fff8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 6px; color: #1a1a1a; }
  p { color: #666; font-size: 0.9rem; margin-bottom: 28px; }
  a.btn { display: block; width: 100%; max-width: 340px; padding: 15px; border-radius: 14px; text-decoration: none; font-size: 1rem; font-weight: 700; text-align: center; margin-bottom: 12px; }
  .customer-btn { background: linear-gradient(135deg, #e65c00, #ff8c42); color: white; box-shadow: 0 4px 14px rgba(230,92,0,0.3); }
  .admin-btn { background: #1a1a2e; color: white; }
</style>
</head>
<body>
<div style="font-size:3rem;margin-bottom:12px">🍽️</div>
<h1>Daily Food Order</h1>
<p>Fresh homemade food, delivered to your door</p>
<a class="btn customer-btn" href="customer.html">🛒 Order Now</a>
<a class="btn admin-btn" href="admin.html">👩‍🍳 Owner Dashboard</a>
<p style="margin-top:20px;font-size:0.75rem">Share the "Order Now" link on WhatsApp</p>
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
