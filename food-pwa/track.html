<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e65c00">
<title>Track Order — Kicken Bites</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{--orange:#e65c00;--orange-pale:#fff3e8;--green:#22c55e;--dark:#1a1a2e;--muted:#666;--radius:14px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f5f5;min-height:100vh;}
  .header{background:var(--dark);color:white;padding:14px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:1000;}
  .header h1{font-size:1rem;font-weight:700;}
  #map{width:100%;height:58vh;background:#e5e5e5;display:none;}
  .info-card{background:white;border-radius:20px 20px 0 0;padding:20px 18px 40px;box-shadow:0 -4px 20px rgba(0,0,0,.1);position:relative;z-index:10;margin-top:-16px;}
  
  /* STATUS BADGES */
  .live-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:white;padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:700;margin-bottom:14px;}
  .delivered-badge{display:inline-flex;align-items:center;gap:6px;background:#f0fdf4;color:var(--green);border:2px solid var(--green);padding:8px 16px;border-radius:20px;font-size:.85rem;font-weight:700;margin-bottom:14px;}
  .pulse{width:8px;height:8px;border-radius:50%;background:white;animation:p 1.5s infinite;}
  @keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

  /* BOY CARD */
  .boy-card{background:var(--orange-pale);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .boy-avatar{width:48px;height:48px;border-radius:50%;background:var(--orange);color:white;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
  .boy-name{font-weight:700;font-size:.95rem;}
  .boy-role{font-size:.75rem;color:var(--muted);}
  .call-btn{margin-left:auto;padding:8px 14px;background:var(--green);color:white;border:none;border-radius:10px;font-weight:700;font-size:.78rem;cursor:pointer;text-decoration:none;display:inline-block;white-space:nowrap;}

  /* ORDER INFO */
  .order-info{background:#f9f9f9;border-radius:var(--radius);padding:13px;margin-bottom:14px;}
  .orow{display:flex;justify-content:space-between;font-size:.83rem;padding:5px 0;border-bottom:1px solid #eee;}
  .orow:last-child{border:none;}
  .orow .label{color:var(--muted);}
  .orow .val{font-weight:600;}

  /* DELIVERED STATE */
  .delivered-box{text-align:center;padding:24px 16px;}
  .delivered-icon{font-size:4rem;margin-bottom:12px;}
  .delivered-title{font-size:1.3rem;font-weight:800;color:var(--green);margin-bottom:6px;}
  .delivered-sub{color:var(--muted);font-size:.85rem;line-height:1.5;}

  /* WHATSAPP SHARE */
  .wa-share-btn{width:100%;padding:14px;background:#25d366;color:white;border:none;border-radius:var(--radius);font-size:.95rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:14px;box-shadow:0 4px 12px rgba(37,211,102,.3);}
  .wa-share-btn:active{transform:scale(.98);}

  /* NOT STARTED */
  .not-started{text-align:center;padding:40px 20px;}
  .not-started .icon{font-size:3rem;margin-bottom:12px;}
  .not-started h2{font-size:1rem;font-weight:700;color:#333;margin-bottom:6px;}
  .not-started p{color:var(--muted);font-size:.83rem;line-height:1.5;}
  .refresh-btn{margin-top:14px;padding:10px 24px;background:var(--orange);color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;font-size:.88rem;}

  .loading{text-align:center;padding:40px;color:var(--muted);}
  .spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <span style="font-size:1.3rem">🍗</span>
  <div>
    <h1>Track Your Delivery</h1>
    <div style="font-size:.7rem;opacity:.7">Kicken Bites</div>
  </div>
</div>

<div id="map"></div>

<div class="info-card">
  <div id="trackContent">
    <div class="loading"><div class="spinner"></div>Loading tracking info…</div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, onSnapshot, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD7in6rCrdL5aiDoY9w8i3k3o9yQXqEWo4",
  authDomain: "myfood-6487f.firebaseapp.com",
  projectId: "myfood-6487f",
  storageBucket: "myfood-6487f.firebasestorage.app",
  messagingSenderId: "133560849575",
  appId: "1:133560849575:web:2a7aa07ef8047928beb782"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const orderId = params.get('order');
const orderName = decodeURIComponent(params.get('name') || '');
const orderTotal = params.get('total') || '';
const orderAddr = decodeURIComponent(params.get('addr') || '');
const orderItems = decodeURIComponent(params.get('items') || '');

let map = null;
let marker = null;
let initialized = false;
let currentDeliveryData = null;

if (!orderId) {
  showError('Invalid tracking link. Please use the link from your order confirmation.');
} else {
  // Listen to order status
  onSnapshot(doc(db, 'orders', orderId), snap => {
    if (!snap.exists()) return;
    const order = snap.data();
    if (order.status === 'delivered') {
      showDelivered(order);
    }
  });

  // Listen to live delivery status
  onSnapshot(doc(db, 'delivery', 'status'), snap => {
    if (!snap.exists()) { showNotStarted(); return; }
    const data = snap.data();
    currentDeliveryData = data;
    if (!data.isDelivering || !data.lat || !data.lng) {
      if (document.getElementById('map').style.display === 'block') return; // already delivered
      showNotStarted();
    } else {
      showLiveTracking(data);
    }
  });
}

function showLiveTracking(data) {
  document.getElementById('map').style.display = 'block';
  if (!initialized) {
    initialized = true;
    map = L.map('map').setView([data.lat, data.lng], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const icon = L.divIcon({
      html: '<div style="background:#e65c00;width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;box-shadow:0 3px 10px rgba(0,0,0,.3);border:3px solid white">🛵</div>',
      iconSize:[42,42], iconAnchor:[21,21], className:''
    });
    marker = L.marker([data.lat, data.lng], {icon}).addTo(map);
    marker.bindPopup(`<b>${data.boyName||'Delivery Boy'}</b><br>On the way to you!`).openPopup();
  } else {
    marker.setLatLng([data.lat, data.lng]);
    map.panTo([data.lat, data.lng]);
  }
  const time = data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';
  document.getElementById('trackContent').innerHTML = `
    <div class="live-badge"><span class="pulse"></span>Live Tracking Active</div>
    <div class="boy-card">
      <div class="boy-avatar">🧑</div>
      <div>
        <div class="boy-name">${data.boyName||'Delivery Boy'}</div>
        <div class="boy-role">🛵 On the way to you!</div>
      </div>
      ${data.boyPhone?`<a class="call-btn" href="tel:${data.boyPhone}">📞 Call</a>`:''}
    </div>
    <div class="order-info">
      <div class="orow"><span class="label">Status</span><span class="val" style="color:var(--green)">🚀 Out for Delivery</span></div>
      <div class="orow"><span class="label">Delivery Boy</span><span class="val">${data.boyName||'—'}</span></div>
      ${data.boyPhone?`<div class="orow"><span class="label">Phone</span><span class="val">${data.boyPhone}</span></div>`:''}
      <div class="orow"><span class="label">Last Updated</span><span class="val">${time}</span></div>
    </div>
    <button class="wa-share-btn" onclick="shareOnWhatsApp()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Share Tracking on WhatsApp
    </button>`;
}

function showDelivered(order) {
  document.getElementById('map').style.display = 'none';
  const delivTime = order.deliveredAt ? new Date(order.deliveredAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';
  document.getElementById('trackContent').innerHTML = `
    <div class="delivered-box">
      <div class="delivered-icon">🎉</div>
      <div class="delivered-badge">✅ Order Delivered!</div>
      <div class="delivered-title">Delivered Successfully!</div>
      <div class="delivered-sub">Your order has been delivered${delivTime?' at '+delivTime:''}.<br>Thank you for ordering from Kicken Bites! 🍗</div>
    </div>
    <div class="order-info">
      <div class="orow"><span class="label">Order ID</span><span class="val">${orderId.slice(-8).toUpperCase()}</span></div>
      <div class="orow"><span class="label">Status</span><span class="val" style="color:var(--green)">✅ Delivered</span></div>
      ${delivTime?`<div class="orow"><span class="label">Delivered At</span><span class="val">${delivTime}</span></div>`:''}
      ${orderItems?`<div class="orow"><span class="label">Items</span><span class="val">${orderItems}</span></div>`:''}
      ${orderTotal?`<div class="orow"><span class="label">Total Paid</span><span class="val">₹${orderTotal}</span></div>`:''}
    </div>
    <button class="wa-share-btn" onclick="shareOnWhatsApp()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Share Order Details on WhatsApp
    </button>`;
}

function showNotStarted() {
  document.getElementById('trackContent').innerHTML = `
    <div class="not-started">
      <div class="icon">🛵</div>
      <h2>Delivery not started yet</h2>
      <p>Your order is being prepared.<br>Tracking will appear here when delivery starts.<br>This page updates automatically!</p>
      <button class="refresh-btn" onclick="location.reload()">🔄 Refresh</button>
    </div>`;
}

function showError(msg) {
  document.getElementById('trackContent').innerHTML = `
    <div class="not-started">
      <div class="icon">❌</div>
      <h2>Invalid tracking link</h2>
      <p>${msg}</p>
    </div>`;
}

window.shareOnWhatsApp = function() {
  const trackUrl = window.location.href;
  let msg = `🍗 *Kicken Bites — Order Tracking*\n\n`;
  if (orderName) msg += `Hi ${orderName}!\n`;
  if (orderItems) msg += `📦 ${orderItems}\n`;
  if (orderTotal) msg += `💰 Total: ₹${orderTotal}\n`;
  if (orderAddr) msg += `📍 ${orderAddr}\n`;
  msg += `\n📍 *Track your delivery here:*\n${trackUrl}\n\nThank you for ordering from Kicken Bites! 🙏`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
};
</script>
</body>
</html>
