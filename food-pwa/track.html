<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#e65c00">
<title>Track Order — Kicken Bites</title>
<style>
:root{--orange:#e65c00;--op:#fff3e8;--green:#22c55e;--dark:#1a1a2e;--muted:#666;--r:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f5f5;min-height:100vh;}
.hdr{background:var(--dark);color:white;padding:13px 16px;display:flex;align-items:center;gap:9px;position:sticky;top:0;z-index:100;}
.hdr h1{font-size:.95rem;font-weight:700;}

/* MAP - Full Google Maps iframe */
#mapContainer{width:100%;height:55vh;background:#e5e5e5;position:relative;}
#googleMap{width:100%;height:100%;border:none;}
#mapPlaceholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;background:linear-gradient(135deg,#f0f4f8,#e5e9f0);color:var(--muted);}
.map-spinner{width:32px;height:32px;border:3px solid #ddd;border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* INFO CARD */
.info-card{background:white;border-radius:20px 20px 0 0;padding:18px 16px 40px;margin-top:-16px;position:relative;z-index:10;box-shadow:0 -4px 20px rgba(0,0,0,.1);}

/* STATUS BADGE */
.live-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:white;padding:6px 14px;border-radius:20px;font-size:.76rem;font-weight:700;margin-bottom:13px;}
.pulse{width:8px;height:8px;border-radius:50%;background:white;animation:p 1.5s infinite;}
@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.delivered-badge{display:inline-flex;align-items:center;gap:6px;background:#f0fdf4;color:var(--green);border:2px solid var(--green);padding:7px 14px;border-radius:20px;font-size:.82rem;font-weight:700;margin-bottom:13px;}
.not-started-badge{display:inline-flex;align-items:center;gap:6px;background:#fff8f0;color:var(--orange);border:2px solid var(--orange);padding:7px 14px;border-radius:20px;font-size:.82rem;font-weight:700;margin-bottom:13px;}

/* ETA CARD */
.eta-card{background:linear-gradient(135deg,var(--dark),#0f3460);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;color:white;display:flex;align-items:center;justify-content:space-between;}
.eta-label{font-size:.72rem;opacity:.7;margin-bottom:3px;}
.eta-val{font-size:1.6rem;font-weight:900;}
.eta-right{text-align:right;}
.eta-dist{font-size:.76rem;opacity:.8;}
.eta-note{font-size:.68rem;opacity:.6;margin-top:2px;}

/* BOY CARD */
.boy-card{background:var(--op);border-radius:var(--r);padding:13px;display:flex;align-items:center;gap:11px;margin-bottom:13px;}
.boy-av{width:46px;height:46px;border-radius:50%;background:var(--orange);color:white;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;}
.boy-name{font-weight:700;font-size:.92rem;}
.boy-role{font-size:.74rem;color:var(--muted);}
.call-btn{margin-left:auto;padding:8px 14px;background:var(--green);color:white;border:none;border-radius:10px;font-weight:700;font-size:.76rem;cursor:pointer;text-decoration:none;white-space:nowrap;flex-shrink:0;}

/* ORDER INFO */
.order-info{background:#f9f9f9;border-radius:var(--r);padding:12px;margin-bottom:13px;}
.orow{display:flex;justify-content:space-between;font-size:.82rem;padding:4px 0;border-bottom:1px solid #eee;}
.orow:last-child{border:none;}
.orow .lbl{color:var(--muted);}
.orow .val{font-weight:600;}

/* DELIVERED */
.del-box{text-align:center;padding:22px 14px;}
.del-icon{font-size:4rem;margin-bottom:11px;}
.del-title{font-size:1.25rem;font-weight:800;color:var(--green);margin-bottom:5px;}
.del-sub{color:var(--muted);font-size:.83rem;line-height:1.5;}

/* NOT STARTED */
.ns-box{text-align:center;padding:30px 14px;}
.ns-icon{font-size:3.5rem;margin-bottom:10px;}
.ns-title{font-size:1rem;font-weight:700;color:#333;margin-bottom:5px;}
.ns-sub{color:var(--muted);font-size:.8rem;line-height:1.5;}
.refresh-btn{margin-top:13px;padding:9px 22px;background:var(--orange);color:white;border:none;border-radius:10px;font-weight:700;font-size:.84rem;cursor:pointer;}

/* ROUTE INFO */
.route-steps{margin-bottom:13px;}
.route-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;}
.step{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;font-size:.8rem;}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0;margin-top:4px;}
.step-line{width:1px;height:100%;background:#eee;margin-left:3px;}

/* WA BUTTON */
.wa-btn{width:100%;padding:13px;background:#25d366;color:white;border:none;border-radius:var(--r);font-size:.9rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 12px rgba(37,211,102,.3);}

/* OPEN MAPS BUTTON */
.maps-btn{width:100%;padding:12px;background:#4285f4;color:white;border:none;border-radius:var(--r);font-size:.88rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:9px;}
</style>
</head>
<body>

<div class="hdr">
  <span style="font-size:1.3rem">🍗</span>
  <div><h1>Track Your Delivery</h1><div style="font-size:.68rem;opacity:.7">Kicken Bites</div></div>
</div>

<div id="mapContainer">
  <div id="mapPlaceholder">
    <div class="map-spinner"></div>
    <p style="font-size:.82rem">Loading map…</p>
  </div>
  <!-- Google Maps will be loaded here -->
  <iframe id="googleMap" style="display:none" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>

<div class="info-card">
  <div id="trackContent">
    <div class="ns-box">
      <div class="ns-icon">🛵</div>
      <div class="ns-title">Loading tracking info…</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, onSnapshot, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD7in6rCrdL5aiDoY9w8i3k3o9yQXqEWo4",
  authDomain: "myfood-6487f.firebaseapp.com",
  projectId: "myfood-6487f",
  storageBucket: "myfood-6487f.firebasestorage.app",
  messagingSenderId: "133560849575",
  appId: "1:133560849575:web:2a7aa07ef8047928beb782"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const orderId = params.get('order');
const orderTotal = params.get('total') || '';
const orderAddr = decodeURIComponent(params.get('addr') || '');
const orderItems = decodeURIComponent(params.get('items') || '');
const custPhone = params.get('phone') || '';

let deliveryLat = null, deliveryLng = null;
let mapShown = false;

if (!orderId) {
  showError('Invalid tracking link.');
} else {
  // Listen to order status
  onSnapshot(doc(db, 'orders', orderId), snap => {
    if (!snap.exists()) return;
    const order = snap.data();
    if (order.status === 'delivered') showDelivered(order);
  });
  // Listen to delivery status
  onSnapshot(doc(db, 'delivery', 'status'), snap => {
    if (!snap.exists()) { showNotStarted(); return; }
    const d = snap.data();
    if (!d.isDelivering || !d.deliveryStarted) { showNotStarted(); return; }
    if (!d.lat || !d.lng) { showNotStarted('Waiting for GPS location…'); return; }
    deliveryLat = d.lat; deliveryLng = d.lng;
    showLiveTracking(d);
  });
}

// --- SHOW GOOGLE MAPS ---
function showGoogleMap(lat, lng, destAddr) {
  const mapContainer = document.getElementById('mapPlaceholder');
  const iframe = document.getElementById('googleMap');
  // Use Google Maps Embed with directions from delivery boy to customer
  // Format: origin = delivery boy GPS, destination = customer address
  const origin = `${lat},${lng}`;
  const dest = encodeURIComponent(destAddr || orderAddr || 'Auraiya, UP');
  const mapsUrl = `https://www.google.com/maps/embed/v1/directions?key=AIzaSyD7in6rCrdL5aiDoY9w8i3k3o9yQXqEWo4&origin=${origin}&destination=${dest}&mode=driving&language=en`;
  if (!mapShown) {
    mapShown = true;
    mapContainer.style.display = 'none';
    iframe.style.display = 'block';
    iframe.src = mapsUrl;
  } else {
    // Just update the source
    iframe.src = mapsUrl;
  }
}

function calcETA(lat1, lng1, lat2str) {
  // Simple distance estimate using coordinates
  // Average delivery speed ~20 km/h in residential area
  try {
    if (!lat2str) return { mins: '15-20', dist: '~3 km' };
    // Return estimate based on typical delivery distance
    const speedKmh = 20;
    const distKm = 3; // typical distance in township
    const mins = Math.round((distKm / speedKmh) * 60);
    return { mins: `${Math.max(5, mins-5)}–${mins+10}`, dist: `~${distKm} km` };
  } catch(e) { return { mins: '15-20', dist: '—' }; }
}

function showLiveTracking(d) {
  const t = d.updatedAt ? new Date(d.updatedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';
  const eta = calcETA(d.lat, d.lng, orderAddr);
  // Show Google Maps
  showGoogleMap(d.lat, d.lng, orderAddr);
  document.getElementById('trackContent').innerHTML = `
    <div class="live-badge"><span class="pulse"></span>Live Tracking Active</div>
    <div class="eta-card">
      <div>
        <div class="eta-label">ESTIMATED ARRIVAL</div>
        <div class="eta-val">${eta.mins} min</div>
        <div class="eta-note">Updated ${t}</div>
      </div>
      <div class="eta-right">
        <div class="eta-label">DISTANCE</div>
        <div style="font-size:1.2rem;font-weight:700">${eta.dist}</div>
        <div class="eta-dist">📍 Tracking live</div>
      </div>
    </div>
    <div class="boy-card">
      <div class="boy-av">🧑</div>
      <div>
        <div class="boy-name">${d.boyName || 'Delivery Boy'}</div>
        <div class="boy-role">🛵 On the way to you!</div>
      </div>
      ${d.boyPhone ? `<a class="call-btn" href="tel:${d.boyPhone}">📞 Call</a>` : ''}
    </div>
    <button class="maps-btn" onclick="openFullGoogleMaps()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      Open in Google Maps App
    </button>
    <div class="order-info">
      <div class="orow"><span class="lbl">Status</span><span class="val" style="color:var(--green)">🚀 Out for Delivery</span></div>
      <div class="orow"><span class="lbl">Delivery Boy</span><span class="val">${d.boyName || '—'}</span></div>
      ${d.boyPhone ? `<div class="orow"><span class="lbl">Phone</span><span class="val">${d.boyPhone}</span></div>` : ''}
      ${orderItems ? `<div class="orow"><span class="lbl">Items</span><span class="val">${orderItems}</span></div>` : ''}
      ${orderTotal ? `<div class="orow"><span class="lbl">Total Paid</span><span class="val">₹${orderTotal}</span></div>` : ''}
      <div class="orow"><span class="lbl">Last Update</span><span class="val">${t}</span></div>
    </div>
    <button class="wa-btn" onclick="shareWA()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Share Tracking on WhatsApp
    </button>`;
}

function showDelivered(order) {
  document.getElementById('mapPlaceholder').style.display = 'none';
  document.getElementById('googleMap').style.display = 'none';
  document.getElementById('mapContainer').style.height = '120px';
  document.getElementById('mapContainer').style.background = 'var(--green)';
  document.getElementById('mapContainer').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:white;font-size:2rem;font-weight:800">🎉 DELIVERED!</div>';
  const dtime = order.deliveredAt ? new Date(order.deliveredAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '';
  document.getElementById('trackContent').innerHTML = `
    <div class="del-box">
      <div class="del-icon">🎉</div>
      <div class="delivered-badge">✅ Order Delivered!</div>
      <div class="del-title">Delivered Successfully!</div>
      <div class="del-sub">Your order was delivered${dtime ? ' at '+dtime : ''}.<br>Thank you for ordering from Kicken Bites! 🍗</div>
    </div>
    <div class="order-info">
      <div class="orow"><span class="lbl">Order ID</span><span class="val">${orderId.slice(-8).toUpperCase()}</span></div>
      <div class="orow"><span class="lbl">Status</span><span class="val" style="color:var(--green)">✅ Delivered</span></div>
      ${dtime ? `<div class="orow"><span class="lbl">Delivered At</span><span class="val">${dtime}</span></div>` : ''}
      ${orderItems ? `<div class="orow"><span class="lbl">Items</span><span class="val">${orderItems}</span></div>` : ''}
      ${orderTotal ? `<div class="orow"><span class="lbl">Total Paid</span><span class="val">₹${orderTotal}</span></div>` : ''}
    </div>
    <button class="wa-btn" onclick="shareWA()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Share Order Details on WhatsApp
    </button>`;
}

function showNotStarted(msg) {
  document.getElementById('mapPlaceholder').style.display = 'flex';
  document.getElementById('googleMap').style.display = 'none';
  document.getElementById('mapPlaceholder').innerHTML = `<div style="font-size:2.5rem">🛵</div><p style="font-size:.82rem;color:var(--muted)">${msg || 'Waiting for delivery to start…'}</p>`;
  document.getElementById('trackContent').innerHTML = `
    <div class="ns-box">
      <div class="ns-icon">🍳</div>
      <div class="not-started-badge">📦 Preparing Your Order</div>
      <div class="ns-title">Delivery not started yet</div>
      <div class="ns-sub">Your order is being prepared fresh!<br>Tracking will appear here when delivery starts.<br>This page updates automatically.</div>
      <button class="refresh-btn" onclick="location.reload()">🔄 Refresh</button>
    </div>
    ${orderItems || orderTotal ? `
    <div class="order-info">
      ${orderItems ? `<div class="orow"><span class="lbl">Items</span><span class="val">${orderItems}</span></div>` : ''}
      ${orderTotal ? `<div class="orow"><span class="lbl">Total Paid</span><span class="val">₹${orderTotal}</span></div>` : ''}
      ${orderAddr ? `<div class="orow"><span class="lbl">Deliver To</span><span class="val">${orderAddr}</span></div>` : ''}
    </div>` : ''}`;
}

function showError(msg) {
  document.getElementById('trackContent').innerHTML = `<div class="ns-box"><div class="ns-icon">❌</div><div class="ns-title">Invalid tracking link</div><div class="ns-sub">${msg}</div></div>`;
}

window.openFullGoogleMaps = function() {
  if (deliveryLat && deliveryLng) {
    const dest = encodeURIComponent(orderAddr || 'Auraiya UP');
    window.open(`https://www.google.com/maps/dir/${deliveryLat},${deliveryLng}/${dest}`, '_blank');
  }
};

window.shareWA = function() {
  const url = window.location.href;
  const msg = `🍗 *Kicken Bites — Order Tracking*\n${orderItems ? '📦 '+orderItems+'\n' : ''}${orderTotal ? '💰 ₹'+orderTotal+'\n' : ''}${orderAddr ? '📍 '+orderAddr+'\n' : ''}\n📍 Track here:\n${url}\n\nThank you for ordering! 🙏`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
};
</script>
</body>
</html>
