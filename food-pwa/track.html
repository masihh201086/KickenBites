<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#e65c00">
<title>Track Your Order — Kicken Bites</title>
<style>
  :root{--orange:#e65c00;--orange-pale:#fff3e8;--green:#22c55e;--dark:#1a1a2e;--muted:#666;--radius:14px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f5f5;min-height:100vh;}
  .header{background:var(--dark);color:white;padding:14px 18px;display:flex;align-items:center;gap:10px;}
  .header h1{font-size:1rem;font-weight:700;}
  #map{width:100%;height:55vh;background:#e5e5e5;}
  .info-card{background:white;border-radius:20px 20px 0 0;margin-top:-20px;position:relative;z-index:10;padding:20px 18px 40px;box-shadow:0 -4px 20px rgba(0,0,0,.1);}
  .status-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:white;padding:6px 14px;border-radius:20px;font-size:.78rem;font-weight:700;margin-bottom:14px;}
  .pulse{width:8px;height:8px;border-radius:50%;background:white;animation:p 1.5s infinite;}
  @keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  .boy-card{background:var(--orange-pale);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .boy-avatar{width:52px;height:52px;border-radius:50%;background:var(--orange);color:white;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
  .boy-name{font-weight:700;font-size:1rem;margin-bottom:2px;}
  .boy-role{font-size:.78rem;color:var(--muted);}
  .call-btn{margin-left:auto;padding:9px 16px;background:var(--green);color:white;border:none;border-radius:10px;font-weight:700;font-size:.82rem;cursor:pointer;text-decoration:none;display:inline-block;}
  .order-info{background:#f9f9f9;border-radius:var(--radius);padding:14px;}
  .orow{display:flex;justify-content:space-between;font-size:.85rem;padding:5px 0;border-bottom:1px solid #eee;}
  .orow:last-child{border:none;}
  .orow .label{color:var(--muted);}
  .orow .val{font-weight:600;}
  .not-started{text-align:center;padding:40px 20px;color:var(--muted);}
  .not-started .icon{font-size:3rem;margin-bottom:12px;}
  .not-started h2{font-size:1rem;font-weight:700;color:#333;margin-bottom:6px;}
  .refresh-btn{margin-top:16px;padding:10px 24px;background:var(--orange);color:white;border:none;border-radius:10px;font-weight:700;cursor:pointer;}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div class="header">
  <span style="font-size:1.4rem">🍗</span>
  <div><h1>Track Your Delivery</h1><div style="font-size:.72rem;opacity:.7">Kicken Bites</div></div>
</div>

<div id="mapContainer">
  <div id="map"></div>
</div>

<div class="info-card">
  <div id="trackingContent">
    <div class="not-started">
      <div class="icon">🛵</div>
      <h2>Delivery not started yet</h2>
      <p>Your order is being prepared.<br>Tracking will appear when delivery starts.</p>
      <button class="refresh-btn" onclick="location.reload()">🔄 Refresh</button>
    </div>
  </div>
</div>

<script type="module">
import { db } from './src/utils/firebase.js';
import { doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

let map = null;
let marker = null;
let customerMarker = null;
let initialized = false;

// Get order ID from URL: track.html?order=ABC123
const params = new URLSearchParams(window.location.search);
const orderId = params.get('order');

if (!orderId) {
  document.getElementById('trackingContent').innerHTML = '<div class="not-started"><div class="icon">❌</div><h2>Invalid tracking link</h2><p>Please use the link from your order confirmation.</p></div>';
} else {
  // Listen to delivery status
  onSnapshot(doc(db, 'delivery', 'status'), snap => {
    if (!snap.exists()) return;
    const data = snap.data();
    if (!data.isDelivering || !data.lat || !data.lng) return;

    // Show map and tracking info
    if (!initialized) {
      initialized = true;
      initMap(data);
    } else {
      updateMarker(data.lat, data.lng);
    }
    updateInfo(data);
  });
}

function initMap(data) {
  document.getElementById('map').style.height = '55vh';
  map = L.map('map').setView([data.lat, data.lng], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // Delivery boy marker
  const boyIcon = L.divIcon({
    html: '<div style="background:#e65c00;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.4rem;box-shadow:0 2px 8px rgba(0,0,0,.3);border:3px solid white">🛵</div>',
    iconSize: [40,40], iconAnchor: [20,20], className:''
  });
  marker = L.marker([data.lat, data.lng], {icon: boyIcon}).addTo(map);
  marker.bindPopup('<b>Your delivery boy</b><br>' + (data.boyName||'Delivery Boy')).openPopup();
}

function updateMarker(lat, lng) {
  if (!marker || !map) return;
  marker.setLatLng([lat, lng]);
  map.panTo([lat, lng]);
}

function updateInfo(data) {
  const content = document.getElementById('trackingContent');
  content.innerHTML = `
    <div class="status-badge"><span class="pulse"></span> Live Tracking Active</div>
    <div class="boy-card">
      <div class="boy-avatar">🧑</div>
      <div>
        <div class="boy-name">${data.boyName || 'Delivery Boy'}</div>
        <div class="boy-role">🛵 On the way to you</div>
      </div>
      ${data.boyPhone ? `<a class="call-btn" href="tel:${data.boyPhone}">📞 Call</a>` : ''}
    </div>
    <div class="order-info">
      <div class="orow"><span class="label">Status</span><span class="val" style="color:var(--green)">🚀 Out for Delivery</span></div>
      <div class="orow"><span class="label">Delivery Boy</span><span class="val">${data.boyName||'—'}</span></div>
      ${data.boyPhone ? `<div class="orow"><span class="label">Phone</span><span class="val">${data.boyPhone}</span></div>` : ''}
      <div class="orow"><span class="label">Last Updated</span><span class="val" id="lastUpdate">${data.updatedAt ? new Date(data.updatedAt).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'}) : '—'}</span></div>
    </div>`;
}
</script>
</body>
</html>
